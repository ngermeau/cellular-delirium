<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="cell1" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ffffaa;stop-opacity:0.9" />
      <stop offset="40%" style="stop-color:#d9ed92;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#b5e48c;stop-opacity:0.3" />
    </radialGradient>
    
    <radialGradient id="cell2" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#b5e48c;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#99d98c;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#76c893;stop-opacity:0.2" />
    </radialGradient>
    
    <radialGradient id="cell3" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#52b69a;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#34a0a4;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#168aad;stop-opacity:0.2" />
    </radialGradient>
    
    <radialGradient id="cell4" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#1a759f;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#1e6091;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#184e77;stop-opacity:0.2" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#184e77"/>
  
  <!-- Large central cell -->
  <circle cx="400" cy="300" r="180" fill="url(#cell3)" opacity="0.6"/>
  <circle cx="400" cy="300" r="150" fill="none" stroke="#34a0a4" stroke-width="2" opacity="0.8"/>
  <circle cx="400" cy="300" r="120" fill="none" stroke="#52b69a" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Nucleus -->
  <circle cx="400" cy="300" r="50" fill="url(#cell1)"/>
  <circle cx="400" cy="300" r="40" fill="none" stroke="#d9ed92" stroke-width="2" opacity="0.7"/>
  <circle cx="415" cy="285" r="8" fill="#ffffaa" opacity="0.8"/>
  
  <!-- Organelles inside main cell -->
  <ellipse cx="340" cy="270" rx="18" ry="25" fill="#99d98c" opacity="0.7"/>
  <ellipse cx="460" cy="310" rx="22" ry="15" fill="#76c893" opacity="0.7"/>
  <ellipse cx="380" cy="360" rx="15" ry="20" fill="#b5e48c" opacity="0.7"/>
  <ellipse cx="440" cy="250" rx="20" ry="18" fill="#52b69a" opacity="0.6"/>
  
  <!-- Surrounding smaller cells -->
  <circle cx="180" cy="150" r="70" fill="url(#cell2)" opacity="0.7"/>
  <circle cx="180" cy="150" r="55" fill="none" stroke="#99d98c" stroke-width="1.5" opacity="0.7"/>
  <circle cx="180" cy="150" r="20" fill="#ffffaa" opacity="0.8"/>
  
  <circle cx="620" cy="180" r="65" fill="url(#cell3)" opacity="0.7"/>
  <circle cx="620" cy="180" r="50" fill="none" stroke="#34a0a4" stroke-width="1.5" opacity="0.7"/>
  <circle cx="620" cy="180" r="18" fill="#d9ed92" opacity="0.8"/>
  
  <circle cx="150" cy="450" r="60" fill="url(#cell4)" opacity="0.7"/>
  <circle cx="150" cy="450" r="45" fill="none" stroke="#1a759f" stroke-width="1.5" opacity="0.7"/>
  <circle cx="150" cy="450" r="15" fill="#168aad" opacity="0.9"/>
  
  <circle cx="650" cy="460" r="55" fill="url(#cell2)" opacity="0.7"/>
  <circle cx="650" cy="460" r="40" fill="none" stroke="#76c893" stroke-width="1.5" opacity="0.7"/>
  <circle cx="650" cy="460" r="12" fill="#b5e48c" opacity="0.8"/>
  
  <!-- Tiny cell clusters -->
  <circle cx="280" cy="120" r="25" fill="#99d98c" opacity="0.3"/>
  <circle cx="280" cy="120" r="8" fill="#d9ed92" opacity="0.5"/>
  
  <circle cx="720" cy="350" r="30" fill="#168aad" opacity="0.3"/>
  <circle cx="720" cy="350" r="10" fill="#1a759f" opacity="0.5"/>
  
  <circle cx="90" cy="300" r="28" fill="#76c893" opacity="0.3"/>
  <circle cx="90" cy="300" r="9" fill="#52b69a" opacity="0.5"/>
  
  <!-- Connecting membrane lines -->
  <path d="M 250 150 Q 300 200 340 240" fill="none" stroke="#b5e48c" stroke-width="1" opacity="0.3"/>
  <path d="M 550 180 Q 500 220 460 260" fill="none" stroke="#34a0a4" stroke-width="1" opacity="0.3"/>
  <path d="M 220 420 Q 280 380 340 360" fill="none" stroke="#1a759f" stroke-width="1" opacity="0.3"/>
  <path d="M 580 430 Q 520 390 460 350" fill="none" stroke="#76c893" stroke-width="1" opacity="0.3"/>
</svg>